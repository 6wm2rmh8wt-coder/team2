<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메디커넥트 - 안전한 복약 관리</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="topnav">
    <div class="logo"><span>메디</span>커넥트</div>
    <nav>
      <a href="/login.html" class="btn btn-secondary">로그인</a>
      <a href="/signup.html" class="btn btn-primary">시작하기</a>
    </nav>
  </header>

  <main>
    <section class="section center container" style="padding-top:80px;padding-bottom:80px;">
      <h1>여러 병원 진료 기록과<br>복약 정보를 한곳에서, 안전하게</h1>
      <p class="muted" style="font-size:18px;max-width:560px;margin:0 auto 24px;">
        진료 기록·처방 이력을 타임라인으로 관리하고, 약물·영양제·음식 간 상호작용 위험을 미리 확인하세요.
      </p>
      <a href="/signup.html" class="btn btn-primary">무료로 시작하기</a>
    </section>

    <section class="section container">
      <div class="row" style="align-items:stretch;">
        <div class="card card-feature card-yellow" style="flex:1;">
          <h4>진료·복약 기록</h4>
          <p>병원 방문, 처방 약물, 진단·병력·검사 결과를 타임라인으로 기록합니다.</p>
        </div>
        <div class="card card-feature card-coral" style="flex:1;">
          <h4>실시간 경고</h4>
          <p>새 약물·영양제 등록 시 위험한 상호작용을 즉시 알려드립니다.</p>
        </div>
        <div class="card card-feature" style="flex:1;background:#c3faf5;">
          <h4>통합 검색엔진</h4>
          <p>궁금한 약물·영양제·음식을 여러 개 동시에 입력해 상호작용을 조회하세요.</p>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
