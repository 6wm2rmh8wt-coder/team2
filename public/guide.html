<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부작용 가이드 - 메디커넥트</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="topnav">
    <a href="/dashboard.html" class="logo"><span>메디</span>커넥트</a>
  </header>

  <main class="container" style="max-width:640px;padding-top:32px;">
    <a href="javascript:history.back()" class="muted">&larr; 이전으로</a>
    <h2>부작용 가이드</h2>
    <div id="content" class="stack"><p class="muted">불러오는 중...</p></div>
  </main>

  <script src="/js/api.js"></script>
  <script>
    (async () => {
      const user = await requireLogin();
      if (!user) return;

      const params = new URLSearchParams(location.search);
      const items = (params.get('items') || '').split(',').map((s) => s.trim()).filter(Boolean);
      const contentEl = document.getElementById('content');

      if (items.length < 2) {
        contentEl.innerHTML = '<p class="muted">확인할 물질 조합이 없습니다.</p>';
        return;
      }

      const result = await apiFetch('/api/interactions/search', {
        method: 'POST',
        body: JSON.stringify({ items }),
      });

      if (result.matches.length === 0) {
        contentEl.innerHTML = '<p class="muted">발견된 상호작용 위험이 없습니다.</p>';
        return;
      }

      contentEl.innerHTML = result.matches.map((m) => `
        <div class="card">
          <div class="row" style="justify-content:space-between;">
            <h4 style="margin:0;">${m.items.join(' + ')}</h4>
            <span class="badge ${m.severity === 'danger' ? 'badge-coral' : 'badge-yellow'}">${m.severity === 'danger' ? '위험' : '주의'}</span>
          </div>
          <p>${m.description}</p>
          ${m.alternatives && m.alternatives.length ? `
            <h4>대체 방법</h4>
            <ul>${m.alternatives.map((a) => `<li>${a} <a class="btn btn-secondary" style="padding:4px 12px;font-size:12px;" href="/substance-new.html?name=${encodeURIComponent(a)}">이걸로 등록</a></li>`).join('')}</ul>
          ` : ''}
          <p class="muted" style="font-size:12px;">출처: ${m.source || '내부 참고자료'}</p>
        </div>
      `).join('');
    })();
  </script>
</body>
</html>
